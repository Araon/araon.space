name: Batch Compress Images

on:
  workflow_dispatch:
  schedule:
    # Run monthly to catch any missed images
    - cron: "0 0 1 * *"

jobs:
  batch-compress:
    name: Batch Compress All Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install image compression tools
        run: |
          npm install -g imagemin-cli imagemin-mozjpeg imagemin-pngquant imagemin-gifsicle imagemin-svgo

      - name: Compress PNG images
        run: |
          find public -type f -name "*.png" -exec pngquant --quality=70-80 --force --skip-if-larger --output {} {} \; || true

      - name: Compress JPEG images
        run: |
          find public -type f \( -name "*.jpg" -o -name "*.jpeg" \) -exec jpegoptim --size=85% --strip-all --quiet {} \; || true

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: batch compress images"
          title: "chore: batch compress all images"
          body: |
            ## Image Compression Results

            This PR contains batch-compressed images to reduce repository size.

            ### Compression Settings
            - PNG: 70-80% quality
            - JPEG: 85% of original size
            - Metadata stripped from JPEGs

            ### Files Changed
            See commit diff for full list of compressed images.
          branch: batch-compress-images
          delete-branch: true
          labels: automated,images
