name: Check Image Sizes

on:
  push:
    branches:
      - main
      - master
      - v2
    paths:
      - "**.jpg"
      - "**.jpeg"
      - "**.png"
      - "**.webp"
      - "**.gif"

jobs:
  check-image-sizes:
    name: Check Image File Sizes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed image files
        id: changed-files
        run: |
          # Get list of changed image files in the last commit
          changed_files=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(jpg|jpeg|png|webp|gif)$' || true)
          echo "files=$changed_files" >> $GITHUB_OUTPUT
          echo "Changed image files: $changed_files"

          # Check each file size
          max_size=1048576  # 1MB in bytes
          has_large_files=false
          large_files=""

          for file in $changed_files; do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo "0")
              if [ "$size" -gt "$max_size" ]; then
                size_mb=$(echo "scale=2; $size / 1048576" | bc)
                has_large_files=true
                large_files="$large_files\n- $file (${size_mb}MB)"
                echo "::warning::Large image detected: $file (${size_mb}MB)"
              fi
            fi
          done

          echo "has_large_files=$has_large_files" >> $GITHUB_OUTPUT
          echo "large_files=$large_files" >> $GITHUB_OUTPUT

      - name: Create warning issue
        if: steps.changed-files.outputs.has_large_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const largeFiles = `${{ steps.changed-files.outputs.large_files }}`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const commitUrl = `${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}`;

            const body = `## ⚠️ Large Image Files Detected

            Large images were pushed in commit [${{ github.sha }}](${commitUrl}):
            ${largeFiles}

            ### Recommendations:
            - Use WebP format for better compression
            - Compress PNGs with [TinyPNG](https://tinypng.com/) or [Squoosh](https://squoosh.app/)
            - Consider converting GIFs to WebM for better compression
            - Images will be auto-compressed by the compression workflow

            [View workflow run](${runUrl})

            ### To compress locally:
            \`\`\`bash
            # Using imagemin
            npx imagemin-cli "path/to/image.png" --out-dir="path/to/output" --plugin=pngquant
            \`\`\``;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Warning: Large images detected in commit ${{ github.sha }}`,
              body: body,
              labels: ['images', 'warning', 'automated']
            });

      - name: Fail if large images found
        if: steps.changed-files.outputs.has_large_files == 'true'
        run: |
          echo "Error: Large image files detected (>1MB). Please compress them."
          echo "Images will be auto-compressed, but consider using smaller images in the future."
          exit 1
