name: Compress Images

on:
  push:
    branches:
      - main
      - master
      - v2
    paths:
      - "**.jpg"
      - "**.jpeg"
      - "**.png"
      - "**.webp"
      - "**.gif"

jobs:
  compress-images:
    name: Compress Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed image files
        id: changed-files
        run: |
          # Get list of changed image files in the last commit
          changed_files=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(jpg|jpeg|png|webp|gif)$' || true)
          {
            echo "files<<EOF"
            echo "$changed_files"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Changed image files: $changed_files"

      - name: Compress images
        if: steps.changed-files.outputs.files != ''
        id: calibre
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: false
        env:
          # Quality settings (0-100, higher = better quality)
          JPEG_QUALITY: 80
          PNG_QUALITY: 80
          WEBP_QUALITY: 80
          # GIF quality (1-200, higher = better quality)
          GIF_QUALITY: 80

      - name: Commit compressed images
        if: steps.calibre.outputs.markdown != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: compress images [skip ci]"
          git push
